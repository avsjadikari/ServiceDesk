{% extends "base.html" %}

{% block title %}Create Database Tables - {{ company_name }} ServiceDesk{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="bi bi-database me-2"></i>Create Database Tables</h4>
                </div>
                <div class="card-body">
                    <p>Some database tables may be missing. Click below to create them.</p>
                    
                    <form method="POST">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-2"></i>Create Tables
                        </button>
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
