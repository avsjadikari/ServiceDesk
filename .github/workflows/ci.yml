name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pylint
        run: |
          source .venv/bin/activate
          pylint app tests
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -q
